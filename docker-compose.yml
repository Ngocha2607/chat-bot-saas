services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mbs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mbs
      POSTGRES_PASSWORD: mbs_dev_password
      POSTGRES_DB: messenger_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbs -d messenger_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mbs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
